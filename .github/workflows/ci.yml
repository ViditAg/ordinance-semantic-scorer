# Run tests on every push to main and on pull requests targeting main.
# Artifacts: JUnit XML, HTML coverage (and terminal coverage in logs).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt pytest-cov

      - name: Run tests with reports
        run: |
          mkdir -p test-reports htmlcov
          pytest tests/ \
            -m "not slow" \
            --junitxml=test-reports/junit.xml \
            --cov=app \
            --cov-report=xml:test-reports/coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --tb=short

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            test-reports/junit.xml
            test-reports/coverage.xml
            htmlcov/
          if-no-files-found: warn
